name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"

jobs:
  test:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]' || !startsWith(github.event.head_commit.message, 'Release v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Black
        run: python -m black --check .
      - name: Mypy
        run: python -m mypy webhooker
      - name: Pytest with coverage
        run: python -m pytest

  version:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]' || !startsWith(github.event.head_commit.message, 'Release v')
    needs: test
    uses: Malaber/github-workflows/.github/workflows/reusable-version.yml@main
    with:
      seed_version: "0.3.0"

  prepare-release:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]' || !startsWith(github.event.head_commit.message, 'Release v')
    needs:
      - test
      - version
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.prepare.outputs.ready }}
      source_sha: ${{ steps.prepare.outputs.source_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Stamp version into repository files
        uses: Malaber/github-workflows/.github/actions/stamp-version@main
        with:
          version: ${{ needs.version.outputs.release_version }}
          replacements: >-
            [{"path":"pyproject.toml","pattern":"^version = \"[^\"]+\"$","replacement":"version = \"{version}\""},{"path":"galaxy.yml","pattern":"^version:\\s*[^\\n]+$","replacement":"version: {version}"},{"path":"roles/webhooker/defaults/main.yml","pattern":"^webhooker_collection_version:\\s*\"[^\"]+\"$","replacement":"webhooker_collection_version: \"{version}\""}]
      - name: Stamp version commit on main before building release artifacts
        id: prepare
        env:
          REF_NAME: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ needs.version.outputs.release_version }}
        run: |
          if [ "$REF_NAME" != "main" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "source_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet -- pyproject.toml galaxy.yml roles/webhooker/defaults/main.yml; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "source_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml galaxy.yml roles/webhooker/defaults/main.yml
          git commit -m "Release v$RELEASE_VERSION"
          git push origin HEAD:main
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-docker:
    if: (github.event_name != 'push' || github.actor != 'github-actions[bot]' || !startsWith(github.event.head_commit.message, 'Release v')) && (github.event_name != 'push' || needs.prepare-release.outputs.ready == 'true')
    needs:
      - test
      - version
      - prepare-release
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && needs.prepare-release.outputs.source_sha || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Stamp release version into build metadata
        uses: Malaber/github-workflows/.github/actions/stamp-version@main
        with:
          version: ${{ needs.version.outputs.release_version }}
          replacements: >-
            [{"path":"pyproject.toml","pattern":"^version = \"[^\"]+\"$","replacement":"version = \"{version}\""},{"path":"galaxy.yml","pattern":"^version:\\s*[^\\n]+$","replacement":"version: {version}"},{"path":"roles/webhooker/defaults/main.yml","pattern":"^webhooker_collection_version:\\s*\"[^\"]+\"$","replacement":"webhooker_collection_version: \"{version}\""}]
      - name: Compute image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: echo "image=ghcr.io/${REPOSITORY,,}/webhooker" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push production Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: |
            ${{ steps.image.outputs.image }}:sha-${{ github.event_name == 'push' && needs.prepare-release.outputs.source_sha || github.sha }}

  release-ansible-collection:
    if: (github.event_name == 'push' && needs.prepare-release.outputs.ready == 'true') && (github.actor != 'github-actions[bot]' || !startsWith(github.event.head_commit.message, 'Release v'))
    needs:
      - test
      - version
      - prepare-release
    uses: Malaber/github-workflows/.github/workflows/reusable-ansible-collection-release.yml@main
    permissions:
      contents: write
    secrets: inherit
    with:
      python_version: "3.14"
      source_sha: ${{ needs.prepare-release.outputs.source_sha }}
      release_version: ${{ needs.version.outputs.release_version }}
      git_tag: ${{ needs.version.outputs.git_tag }}
      prerelease: ${{ needs.version.outputs.prerelease }}
      stamp_replacements: >-
        [{"path":"pyproject.toml","pattern":"^version = \"[^\"]+\"$","replacement":"version = \"{version}\""},{"path":"galaxy.yml","pattern":"^version:\\s*[^\\n]+$","replacement":"version: {version}"},{"path":"roles/webhooker/defaults/main.yml","pattern":"^webhooker_collection_version:\\s*\"[^\"]+\"$","replacement":"webhooker_collection_version: \"{version}\""}]
      artifact_name: malaber-webhooker-${{ needs.version.outputs.release_version }}

  release:
    if: (github.event_name == 'push' && needs.prepare-release.outputs.ready == 'true') && (github.actor != 'github-actions[bot]' || !startsWith(github.event.head_commit.message, 'Release v'))
    needs:
      - test
      - version
      - prepare-release
      - build-docker
      - release-ansible-collection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.source_sha }}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Promote Docker image
        env:
          PRERELEASE: ${{ needs.version.outputs.prerelease }}
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            docker buildx imagetools create \
              ${{ needs.build-docker.outputs.image }}:sha-${{ needs.prepare-release.outputs.source_sha }} \
              --tag ${{ needs.build-docker.outputs.image }}:${{ needs.version.outputs.release_version }}
          else
            docker buildx imagetools create \
              ${{ needs.build-docker.outputs.image }}:sha-${{ needs.prepare-release.outputs.source_sha }} \
              --tag ${{ needs.build-docker.outputs.image }}:${{ needs.version.outputs.release_version }} \
              --tag ${{ needs.build-docker.outputs.image }}:latest
          fi
