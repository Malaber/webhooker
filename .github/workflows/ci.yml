name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Black
        run: python -m black --check .
      - name: Mypy
        run: python -m mypy webhooker
      - name: Pytest with coverage
        run: python -m pytest

  version:
    needs: test
    uses: ./.github/workflows/reusable-version.yml
    with:
      seed_version: "0.3.0"

  prepare-release:
    needs:
      - test
      - version
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.prepare.outputs.ready }}
      source_sha: ${{ steps.prepare.outputs.source_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Stamp version commit on main before building release artifacts
        id: prepare
        env:
          REF_NAME: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ needs.version.outputs.release_version }}
        run: |
          if [ "$REF_NAME" != "main" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "source_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python .github/scripts/stamp_version.py "$RELEASE_VERSION"

          if git diff --quiet -- pyproject.toml galaxy.yml; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "source_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml galaxy.yml
          git commit -m "Release v$RELEASE_VERSION"
          git push origin HEAD:main
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-docker:
    needs:
      - test
      - version
      - prepare-release
    if: github.event_name != 'push' || needs.prepare-release.outputs.ready == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && needs.prepare-release.outputs.source_sha || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Stamp release version into build metadata
        run: python .github/scripts/stamp_version.py "${{ needs.version.outputs.release_version }}"
      - name: Compute image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: echo "image=ghcr.io/${REPOSITORY,,}/webhooker" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push production Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: |
            ${{ steps.image.outputs.image }}:sha-${{ github.event_name == 'push' && needs.prepare-release.outputs.source_sha || github.sha }}

  build-ansible-collection:
    needs:
      - test
      - version
      - prepare-release
    if: github.event_name == 'push' && needs.prepare-release.outputs.ready == 'true'
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.artifact.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.source_sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ansible-core
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ansible-core>=2.15,<2.18"
      - name: Stamp release version into build metadata
        run: python .github/scripts/stamp_version.py "${{ needs.version.outputs.release_version }}"
      - name: Build collection tarball
        run: ansible-galaxy collection build --force --output-path dist
      - name: Record artifact name
        id: artifact
        env:
          VERSION: ${{ needs.version.outputs.release_version }}
        run: echo "name=malaber-webhooker-${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Upload collection artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: dist/*.tar.gz

  release:
    if: github.event_name == 'push' && needs.prepare-release.outputs.ready == 'true'
    needs:
      - test
      - version
      - prepare-release
      - build-docker
      - build-ansible-collection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.source_sha }}
      - name: Create or update git tag
        env:
          GIT_TAG: ${{ needs.version.outputs.git_tag }}
          SOURCE_SHA: ${{ needs.prepare-release.outputs.source_sha }}
        run: |
          if git rev-parse "$GIT_TAG" >/dev/null 2>&1; then
            echo "Tag $GIT_TAG already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$GIT_TAG" "$SOURCE_SHA"
            git push origin "$GIT_TAG"
          fi
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Promote Docker image
        env:
          PRERELEASE: ${{ needs.version.outputs.prerelease }}
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            docker buildx imagetools create \
              ${{ needs.build-docker.outputs.image }}:sha-${{ needs.prepare-release.outputs.source_sha }} \
              --tag ${{ needs.build-docker.outputs.image }}:${{ needs.version.outputs.release_version }}
          else
            docker buildx imagetools create \
              ${{ needs.build-docker.outputs.image }}:sha-${{ needs.prepare-release.outputs.source_sha }} \
              --tag ${{ needs.build-docker.outputs.image }}:${{ needs.version.outputs.release_version }} \
              --tag ${{ needs.build-docker.outputs.image }}:latest
          fi
      - name: Download collection artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-ansible-collection.outputs.artifact_name }}
          path: dist
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.git_tag }}
          name: ${{ needs.version.outputs.git_tag }}
          prerelease: ${{ needs.version.outputs.prerelease == 'true' }}
          files: dist/*.tar.gz
