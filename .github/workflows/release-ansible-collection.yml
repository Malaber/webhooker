name: release-ansible-collection

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install ansible-core
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ansible-core>=2.15,<2.18"

      - name: Verify collection version matches tag
        run: |
          python - <<'PY'
          import pathlib
          import re

          ref = "${{ github.ref_name }}"
          expected = ref.removeprefix("v")
          galaxy = pathlib.Path("ansible_collections/malaber/webhooker/galaxy.yml").read_text(encoding="utf-8")
          match = re.search(r"^version:\s*([0-9]+\.[0-9]+\.[0-9]+)\s*$", galaxy, re.MULTILINE)
          if match is None:
              raise SystemExit("galaxy.yml is missing a version field")
          actual = match.group(1)
          if actual != expected:
              raise SystemExit(f"Tag version {expected} does not match galaxy.yml version {actual}")
          PY

      - name: Build collection tarball
        working-directory: ansible_collections/malaber/webhooker
        run: ansible-galaxy collection build --output-path ../../../dist

      - name: Publish GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
