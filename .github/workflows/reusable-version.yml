name: reusable-version

on:
  workflow_call:
    inputs:
      seed_version:
        description: Stable semver floor used when no stable tags exist yet.
        required: true
        type: string
    outputs:
      base_version:
        description: Next stable semver derived from tags.
        value: ${{ jobs.version.outputs.base_version }}
      release_version:
        description: Stable version on main, rc version on non-main branches.
        value: ${{ jobs.version.outputs.release_version }}
      git_tag:
        description: Git tag for the computed version.
        value: ${{ jobs.version.outputs.git_tag }}
      prerelease:
        description: Whether the computed version is a prerelease.
        value: ${{ jobs.version.outputs.prerelease }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.version.outputs.base_version }}
      release_version: ${{ steps.version.outputs.release_version }}
      git_tag: ${{ steps.version.outputs.git_tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Compute release version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
          SEED_VERSION: ${{ inputs.seed_version }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess

          stable_pattern = re.compile(r"^v(\d+)\.(\d+)\.(\d+)$")

          def parse_semver(value: str) -> tuple[int, int, int]:
              return tuple(int(part) for part in value.split("."))

          def tag_exists(tag: str) -> bool:
              return subprocess.run(
                  ["git", "rev-parse", "--verify", "--quiet", tag],
                  check=False,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              ).returncode == 0

          def latest_stable_version(seed: str) -> str:
              tags = subprocess.run(
                  ["git", "tag", "--list", "v*"],
                  check=True,
                  capture_output=True,
                  text=True,
              ).stdout.splitlines()
              versions = [
                  tuple(map(int, match.groups()))
                  for tag in tags
                  if (match := stable_pattern.fullmatch(tag))
              ]
              versions.append(parse_semver(seed))
              major, minor, patch = max(versions)
              return f"{major}.{minor}.{patch}"

          def next_stable_version(version: str) -> str:
              major, minor, patch = parse_semver(version)
              patch += 1
              candidate = f"{major}.{minor}.{patch}"
              while tag_exists(f"v{candidate}"):
                  patch += 1
                  candidate = f"{major}.{minor}.{patch}"
              return candidate

          def next_rc_version(version: str, run_number: int) -> str:
              rc_number = run_number
              candidate = f"{version}-rc.{rc_number}"
              while tag_exists(f"v{candidate}"):
                  rc_number += 1
                  candidate = f"{version}-rc.{rc_number}"
              return candidate

          base_version = next_stable_version(latest_stable_version(os.environ["SEED_VERSION"]))
          if os.environ["REF_NAME"] == "main":
              release_version = base_version
              prerelease = "false"
          else:
              release_version = next_rc_version(base_version, int(os.environ["RUN_NUMBER"]))
              prerelease = "true"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"base_version={base_version}\n")
              fh.write(f"release_version={release_version}\n")
              fh.write(f"git_tag=v{release_version}\n")
              fh.write(f"prerelease={prerelease}\n")
          PY
