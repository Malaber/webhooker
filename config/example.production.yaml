project_id: example-production

github:
  owner: your-github-user-or-org
  repo: example-app
  token_env: GITHUB_TOKEN
  webhook_secret_env: GITHUB_WEBHOOK_SECRET
  required_event_types:
    - push
    - ping

deployment:
  mode: production
  compose_file: /srv/example-app/deploy/compose.production.yml
  # The published webhooker image already includes the Docker CLI and Compose plugin.
  compose_bin: docker
  working_directory: /srv/example-app/deploy
  project_name_prefix: example-app-
  production_project_name: example-app-production
  production_hostname: app.example.com

image:
  registry: ghcr.io
  repository: your-github-user-or-org/example-app
  tag_template: "unused-for-production"
  production_tag_template: "sha-{sha7}"

production:
  branch: main
  data_dir: /srv/example-app/data/production
  sqlite_path: /srv/example-app/data/production/app.db
  backup_dir: /srv/example-app/data/production/backups
  backup_keep: 3

reconcile:
  poll_interval_seconds: 600
  cleanup_closed_prs: false
  redeploy_on_sha_change: true

traefik:
  enable_labels: true
  certresolver: letsencrypt

state:
  state_file: /srv/example-app/webhooker/runtime/state/example-production.json

wake:
  wake_file: /srv/example-app/webhooker/runtime/wake/example-production
